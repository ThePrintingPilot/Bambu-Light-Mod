name: Update Web Installer

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-installer:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get latest release version and download firmware
        id: release
        run: |
          # Fetch latest release info
          RELEASE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/ThePrintingPilot/Bambu-Light-Mod/releases/latest")

          VERSION=$(echo "$RELEASE" | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
          BIN_URL=$(echo "$RELEASE" | python3 -c "
          import json,sys
          r = json.load(sys.stdin)
          for a in r['assets']:
              if a['name'].endswith('.bin'):
                  print(a['browser_download_url'])
                  break
          ")

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest version: $VERSION"
          echo "Downloading: $BIN_URL"

          curl -L "$BIN_URL" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -o docs/bambu_gpio_sync.bin

          if [ ! -s docs/bambu_gpio_sync.bin ]; then
            echo "ERROR: Could not download .bin file"
            exit 1
          fi

      - name: Update manifest version
        run: |
          VERSION="${{ steps.release.outputs.VERSION }}"
          VERSION_CLEAN=$(echo "$VERSION" | sed 's/^[vV]//')

          python3 -c "
          import json
          with open('docs/manifest.json') as f:
              m = json.load(f)
          m['version'] = '$VERSION_CLEAN'
          m['builds'][0]['parts'][0]['path'] = 'bambu_gpio_sync.bin'
          with open('docs/manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
          print('Manifest updated to version $VERSION_CLEAN')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/bambu_gpio_sync.bin docs/manifest.json
          git diff --staged --quiet || git commit -m "chore: update installer to ${{ steps.release.outputs.VERSION }}"
          git push
