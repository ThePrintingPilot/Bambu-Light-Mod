name: Update Web Installer

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to set in manifest (e.g. 1.5.0)'
        required: true
        default: '1.5.0'

jobs:
  update-installer:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download firmware from release
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Try with and without leading V
          for TAG in "$VERSION" "V$VERSION" "v$VERSION"; do
            URL="https://github.com/ThePrintingPilot/Bambu-Light-Mod/releases/download/$TAG/bambu_gpio_sync.bin"
            echo "Trying: $URL"
            HTTP=$(curl -L -w "%{http_code}" -o docs/bambu_gpio_sync.bin \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "$URL")
            if [ "$HTTP" = "200" ]; then
              echo "Downloaded successfully from tag: $TAG"
              break
            fi
          done

          if [ ! -s docs/bambu_gpio_sync.bin ]; then
            echo "ERROR: Could not download .bin file"
            exit 1
          fi

      - name: Update manifest version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          VERSION_CLEAN=$(echo "$VERSION" | sed 's/^[vV]//')

          python3 -c "
          import json
          with open('docs/manifest.json') as f:
              m = json.load(f)
          m['version'] = '$VERSION_CLEAN'
          m['builds'][0]['parts'][0]['path'] = 'bambu_gpio_sync.bin'
          with open('docs/manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
          print('Manifest updated to version $VERSION_CLEAN')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/bambu_gpio_sync.bin docs/manifest.json
          git diff --staged --quiet || git commit -m "chore: update installer to ${{ steps.version.outputs.VERSION }}"
          git push
